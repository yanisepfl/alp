[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
# Lower optimizer_runs trades runtime gas for smaller bytecode, keeping
# ALPVault under the 24,576-byte EIP-170 limit after the audit-fix pass.
optimizer_runs = 1
via_ir = true
evm_version = "cancun"

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false

# Deeper-fuzz profile for pre-merge / nightly. Run with:
#   FOUNDRY_PROFILE=deep forge test
[profile.deep]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[profile.deep.fuzz]
runs = 4096

[profile.deep.invariant]
runs = 512
depth = 128
fail_on_revert = false

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
